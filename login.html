<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tienda SNKRS</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Header exclusivo para Login (Sin barra de navegacion) -->
    <header>
        <div class="logo">SNKRS <span>STORE</span></div>
        <div>
            <button id="themeToggle" class="theme-toggle-btn">
                🌙 <span id="themeText">Modo Claro</span>
            </button>
        </div>
    </header>

    <!-- Formulario de Login -->
    <main class="login-container">
        <h2>Iniciar Sesión</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">
            Ingresa tus datos para acceder al catálogo exclusivo.
        </p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="usuario@snkrs.com">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-submit">Ingresar</button>
            
            <p id="errorMsg" style="color: var(--primary-color); display: none; margin-top: 1rem; text-align: center; font-size: 0.9rem;">
                Por favor ingresa un correo y contraseña válidos.
            </p>
        </form>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Tienda SNKRS. Todos los derechos reservados.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
